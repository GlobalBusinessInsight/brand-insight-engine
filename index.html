            let currentChart = null;

            function switchTab(brand) {
                // Update tabs UI
                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active'));
                document.getElementById('tab-' + brand).classList.add('tab-active');

                // Update Chart
                updateChart(brand);

                // Update Feed
                updateFeed(brand);
                
                // Update Title
                document.getElementById('chart-title').innerText = 'Sentiment: ' + (brand === 'all' ? 'All Brands' : brand);
            }

            function updateChart(brand) {
                const ctx = document.getElementById('sentimentChart').getContext('2d');
                const stats = dashboardData[brand].stats;

                if (currentChart) {
                    currentChart.destroy();
                }

                currentChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Positive', 'Negative', 'Neutral'],
                        datasets: [{
                            data: stats,
                            backgroundColor: ['#00ffaa', '#ff0055', '#3b82f6'],
                            borderColor: '#16161a',
                            borderWidth: 2,
                            hoverOffset: 10
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    color: '#94a3b8',
                                    usePointStyle: true,
                                    padding: 20,
                                    font: { size: 11, family: 'monospace' }
                                }
                            }
                        },
                        cutout: '70%'
                    }
                });
            }

            function updateFeed(brand) {
                const feed = document.getElementById('news-feed');
                const items = dashboardData[brand].items;
                
                feed.innerHTML = items.map(item => {
                    const sentiment = item.sentiment || 'Neutral';
                    const sentimentClass = 'sentiment-' + sentiment.toLowerCase();
                    const riskIcon = sentiment.toLowerCase() === 'negative' 
                        ? '<span class="text-cyber-danger text-xs flex items-center mt-1"><svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg> HIGH RISK ALERT</span>'
                        : '';
                    
                    return `
                        <div class="cyber-card p-5 rounded-lg ${sentimentClass}">
                            <div class="flex justify-between items-start mb-2">
                                <span class="px-2 py-0.5 text-[10px] font-bold tracking-widest text-cyber-primary border border-cyber-primary rounded uppercase">
                                    ${item.keyword || 'GENERAL'}
                                </span>
                                <span class="text-[10px] text-gray-600 font-mono italic">${item.source || 'Web'}</span>
                            </div>
                            <h2 class="text-md font-bold text-gray-200 leading-snug mb-2">
                                <a href="${item.url || item.link || '#'}" target="_blank" class="hover:text-cyber-accent transition-colors">
                                    ${item.title || 'No Title'}
                                </a>
                            </h2>
                            <p class="text-xs text-gray-400 line-clamp-3 mb-3">
                                ${item.summary || (item.content ? item.content.substring(0, 100) : '')}
                            </p>
                            <div class="flex justify-between items-end border-t border-gray-800 pt-3 mt-2">
                                <span class="text-[10px] text-gray-600 uppercase">Analysis: <span class="text-gray-400">${sentiment}</span></span>
                                ${riskIcon}
                            </div>
                        </div>
                    `;
                }).join('');
            }

            // Initial load
            switchTab('all');
        </script>
